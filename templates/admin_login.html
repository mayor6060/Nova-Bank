<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Bank — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #C9A84C; --gold-light: #E8C97A; --dark: #0A0D12; --panel: #10141C; --border: rgba(201,168,76,0.18); --text: #E8E2D6; --muted: #7A7568; }
    body { background: var(--dark); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(201,168,76,0.05) 0%, transparent 60%); pointer-events: none; }
    .grid-lines { position: fixed; inset: 0; background-image: linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
    .box { width: 380px; max-width: 95vw; background: var(--panel); border: 1px solid var(--border); padding: 50px 44px; border-radius: 2px; animation: fadeIn 0.6s ease both; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .badge { display: inline-block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); border: 1px solid rgba(201,168,76,0.3); padding: 4px 10px; margin-bottom: 20px; }
    .title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--text); margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 30px; }
    .flash-msg { background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.3); color: var(--gold-light); padding: 10px 14px; font-size: 13px; border-radius: 1px; margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 1px; padding: 12px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; margin-bottom: 20px; }
    input:focus { border-color: var(--gold); background: rgba(201,168,76,0.04); }
    input::placeholder { color: rgba(122,117,104,0.6); }
    .btn { width: 100%; padding: 13px; background: var(--gold); color: var(--dark); border: none; border-radius: 1px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: var(--gold-light); }
    .back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); text-decoration: none; }
    .back:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="grid-lines"></div>
  <div class="box">
    <div class="badge">Admin Access</div>
    <div class="title">Admin Login</div>
    <div class="subtitle">Nova Bank staff only</div>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="flash-msg">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <form method="POST">
      <label>Admin Password</label>
      <input type="password" name="password" placeholder="Enter admin password" required autofocus />
      <button type="submit" class="btn">Access Dashboard</button>
    </form>
    <a href="/login" class="back">← Back to main site</a>
  </div>
</body>
</html>
