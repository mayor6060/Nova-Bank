<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Bank — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --dark: #0A0D12;
      --panel: #10141C;
      --border: rgba(201,168,76,0.18);
      --text: #E8E2D6;
      --muted: #7A7568;
    }

    body {
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 30%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .grid-lines {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      display: flex;
      width: 900px;
      max-width: 95vw;
      min-height: 560px;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
      animation: fadeIn 0.8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Left panel */
    .brand-panel {
      flex: 1;
      background: linear-gradient(160deg, #0F1320 0%, #080B10 100%);
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .brand-panel::after {
      content: 'N';
      position: absolute;
      bottom: -40px;
      right: -20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 280px;
      font-weight: 300;
      color: rgba(201,168,76,0.04);
      line-height: 1;
      pointer-events: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      border: 1.5px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--gold);
    }

    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .brand-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.25;
      letter-spacing: 0.5px;
    }

    .brand-tagline em {
      color: var(--gold);
      font-style: italic;
    }

    .brand-footer {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* Right panel (form) */
    .form-panel {
      width: 380px;
      background: var(--panel);
      padding: 60px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .form-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .flash-msg {
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold-light);
      padding: 10px 14px;
      font-size: 13px;
      border-radius: 1px;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--gold);
      background: rgba(201,168,76,0.04);
    }

    input::placeholder { color: rgba(122,117,104,0.6); }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      color: var(--dark);
      border: none;
      border-radius: 1px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--gold-light); }
    .btn-primary:active { transform: scale(0.99); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span { font-size: 11px; color: var(--muted); }

    .link-btn {
      display: block;
      text-align: center;
      font-size: 13px;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: color 0.2s;
    }

    .link-btn:hover { color: var(--gold-light); }

    @media (max-width: 700px) {
      .brand-panel { display: none; }
      .form-panel { width: 100%; padding: 40px 28px; }
    }
  </style>
</head>
<body>
  <div class="grid-lines"></div>
  <div class="container">
    <div class="brand-panel">
      <div class="logo">
        <div class="logo-mark"><span>N</span></div>
        <div class="logo-name">Nova Bank</div>
      </div>
      <div class="brand-tagline">
        Banking refined<br>for the <em>modern</em><br>individual.
      </div>
      <div class="brand-footer">NOVA BANK · DEMO PROJECT · NOT A REAL BANK</div>
    </div>

    <div class="form-panel">
      <div class="form-title">Welcome back</div>
      <div class="form-subtitle">Sign in to your account</div>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash-msg">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

      <form method="POST">
        <div class="field">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <div class="divider"><span>or</span></div>
      <a href="/register" class="link-btn">Create a new account →</a>
    </div>
  </div>
</body>
</html>
